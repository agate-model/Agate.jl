name: Documentation

on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
    types:
      - closed

jobs:
  build:
    permissions:
      contents: write
      statuses: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.10'

      - name: Install docs dependencies (use local Agate)
        run: |

          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()
            Pkg.precompile()
          '

      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # GitHub Actions token auth
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }} # SSH deploy key auth (optional)
        run: julia --project=docs docs/make.jl
